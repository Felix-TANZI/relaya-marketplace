name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: belivay_test
          POSTGRES_USER: belivay
          POSTGRES_PASSWORD: belivay
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd "pg_isready -U belivay"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DJANGO_SETTINGS_MODULE: relaya.settings.test
      DJANGO_SECRET_KEY: ci-test-secret-key
      POSTGRES_DB: belivay_test
      POSTGRES_USER: belivay
      POSTGRES_PASSWORD: belivay
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_SSLMODE: disable
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint
      - run: npm run test